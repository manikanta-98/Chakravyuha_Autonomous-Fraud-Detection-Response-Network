apiVersion: apps/v1
kind: Deployment
metadata:
  name: fraud-detection-api
  labels:
    app: fraud-detection
    component: api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: fraud-detection
      component: api
  template:
    metadata:
      labels:
        app: fraud-detection
        component: api
    spec:
      containers:
      - name: api
        image: ghcr.io/your-org/fraud-detection-backend:latest
        ports:
        - containerPort: 8000
        env:
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: fraud-detection-secrets
              key: redis-url
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: fraud-detection-secrets
              key: database-url
        - name: JWT_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: fraud-detection-secrets
              key: jwt-secret
        - name: MLFLOW_TRACKING_URI
          value: "http://mlflow-service:5000"
        resources:
          requests:
            cpu: 500m
            memory: 1Gi
          limits:
            cpu: 2000m
            memory: 4Gi
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          runAsUser: 1000
          capabilities:
            drop:
            - ALL
      securityContext:
        fsGroup: 1000
      serviceAccountName: fraud-detection-sa

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fraud-detection-worker
  labels:
    app: fraud-detection
    component: worker
spec:
  replicas: 5
  selector:
    matchLabels:
      app: fraud-detection
      component: worker
  template:
    metadata:
      labels:
        app: fraud-detection
        component: worker
    spec:
      containers:
      - name: worker
        image: ghcr.io/your-org/fraud-detection-worker:latest
        env:
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: fraud-detection-secrets
              key: redis-url
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: fraud-detection-secrets
              key: database-url
        resources:
          requests:
            cpu: 1000m
            memory: 2Gi
          limits:
            cpu: 3000m
            memory: 6Gi
        livenessProbe:
          exec:
            command:
            - python
            - -c
            - "import redis; redis.from_url(os.getenv('REDIS_URL')).ping()"
          initialDelaySeconds: 30
          periodSeconds: 30
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          runAsUser: 1000
          capabilities:
            drop:
            - ALL
      securityContext:
        fsGroup: 1000
      serviceAccountName: fraud-detection-sa

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fraud-detection-frontend
  labels:
    app: fraud-detection
    component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fraud-detection
      component: frontend
  template:
    metadata:
      labels:
        app: fraud-detection
        component: frontend
    spec:
      containers:
      - name: frontend
        image: ghcr.io/your-org/fraud-detection-frontend:latest
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          runAsUser: 101
          capabilities:
            drop:
            - ALL
      securityContext:
        fsGroup: 101