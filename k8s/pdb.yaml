apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: fraud-detection-api-pdb
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: fraud-detection
      component: api

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: fraud-detection-worker-pdb
spec:
  minAvailable: 3
  selector:
    matchLabels:
      app: fraud-detection
      component: worker

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: fraud-detection-frontend-pdb
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: fraud-detection
      component: frontend