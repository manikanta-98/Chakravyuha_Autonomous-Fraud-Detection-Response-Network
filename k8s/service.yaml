apiVersion: v1
kind: Service
metadata:
  name: fraud-detection-api
  labels:
    app: fraud-detection
    component: api
spec:
  type: ClusterIP
  ports:
  - port: 8000
    targetPort: 8000
    protocol: TCP
    name: http
  selector:
    app: fraud-detection
    component: api

---
apiVersion: v1
kind: Service
metadata:
  name: fraud-detection-frontend
  labels:
    app: fraud-detection
    component: frontend
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP
    name: http
  selector:
    app: fraud-detection
    component: frontend

